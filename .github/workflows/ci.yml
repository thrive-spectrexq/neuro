name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Ruff Linting
      working-directory: ./backend
      run: ruff check .

    - name: Run Ruff Formatting Check
      working-directory: ./backend
      run: ruff format --check .

    - name: Run Tests
      working-directory: ./backend
      run: pytest

  frontend-test:
    name: Frontend Tests (Turborepo)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Linting
      run: pnpm turbo run lint

    - name: Run Typecheck
      run: pnpm turbo run typecheck

    - name: Run Tests
      run: pnpm turbo run test

  build-desktop:
    name: Build Desktop App
    runs-on: ${{ matrix.os }}
    needs: [frontend-test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Web & Shared Packages First
      run: pnpm turbo run build --filter="@neuro/web" --filter="@neuro/shared" --filter="@neuro/ui" --filter="@neuro/sdk"

    - name: Build Electron App
      run: pnpm turbo run build --filter="@neuro/desktop"
